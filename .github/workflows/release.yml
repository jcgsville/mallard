name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          package_version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            printf 'Tag %s does not match Cargo.toml version %s\n' "$GITHUB_REF_NAME" "$package_version" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: 1.86.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
      - name: Run tests
        run: cargo test --locked
      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Package release archive
        shell: bash
        run: |
          binary="target/${{ matrix.target }}/release/mallard"
          if [ "${{ runner.os }}" = "Windows" ]; then
            binary="${binary}.exe"
          fi
          ./scripts/package-release.sh "${{ matrix.target }}" "$binary" dist
      - name: Upload packaged artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true
      - name: Add release installer
        shell: bash
        run: |
          cp scripts/install.sh dist/install.sh
          (cd dist && sha256sum install.sh > install.sh.sha256)
      - name: Build combined checksum file
        shell: bash
        run: cat dist/*.sha256 > dist/checksums.txt
      - name: Create GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: dist/*
          generate_release_notes: true
